<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }
    body { transition: opacity 0.3s ease; }
    video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <video autoplay playsinline>
    <source src="intro.mp4" type="video/mp4">
  </video>
  <audio autoplay id="sfx">
    <source src="startup.wav" type="audio/wav">
  </audio>
  <script>document.getElementById('sfx').volume = 0.25;</script>
</body>
</html>
